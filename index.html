<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Responsive Image Gallery</h1>
    <!--Filter Buttons-->
    <div class="buttons">
        <button class="active" data-filter="all">All</button>
        <button data-filter="nature">Nature</button>
        <button data-filter="countries">Countries</button>
        <button data-filter="flowers">Flowers</button>
    </div>
    <!--Gallery-->
    <div class="gallery">
        <div class="image countries">
            <img src="Pakistan.jpeg" alt="Pakistan">
        </div>
        <div class="image countries">
            <img src="turkiye.jpg" alt="Turkiye">
        </div>
        <div class="image countries">
            <img src="india.webp" alt="India">
        </div>
        <div class="image countries">
            <img src="maldives.jpg" alt="Maldives">
        </div>
        <div class="image nature">
            <img src="nature1.webp" alt="Nature">
        </div>
        <div class="image nature">
            <img src="nature2.jpg" alt="Nature">
        </div>
        <div class="image nature">
            <img src="nature3.jpg" alt="Nature">
        </div>
        <div class="image nature">
            <img src="nature4.jpg" alt="Nature">
        </div>
        <div class="image nature">
            <img src="nature5.webp" alt="Nature">
        </div>
        <div class="image flowers">
            <img src="flower.jpg" alt="Flower">
        </div>
        <div class="image flowers">
            <img src="roses.jpg" alt="Roses">
        </div>
        <div class="image flowers">
            <img src="pinkflowers.webp" alt="Flower">
        </div>
    </div>

    <!--Lightbox-->
    <div class="lightbox">
        <span class="close">&times;</span>
        <button class="prev">&#10094</button>
        <img id="lightbox-img">
        <button class="next">&#10095</button>
        <p id="counter"></p>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
